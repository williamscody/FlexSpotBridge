name: Release macOS app

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install py2app

      - name: Validate release version metadata
        run: |
          TAG_VERSION="${RELEASE_TAG#v}"
          APP_VERSION=$(python - <<'PY'
          from version import app_version_label
          print(app_version_label())
          PY
          )
          README_VERSION=$(python - <<'PY'
          import re
          with open('README.md', 'r', encoding='utf-8') as f:
              m = re.search(r'Current release:\s*\*\*(.+?)\*\*', f.read())
          print(m.group(1).strip() if m else '')
          PY
          )

          echo "Tag version:    ${TAG_VERSION}"
          echo "App version:    ${APP_VERSION}"
          echo "README version: ${README_VERSION}"

          if [ "${TAG_VERSION}" != "${APP_VERSION}" ]; then
            echo "Tag v${TAG_VERSION} does not match app version ${APP_VERSION}."
            exit 1
          fi

          if [ -n "${README_VERSION}" ] && [ "${TAG_VERSION}" != "${README_VERSION}" ]; then
            echo "Tag v${TAG_VERSION} does not match README current release ${README_VERSION}."
            exit 1
          fi

      - name: Build py2app bundle
        run: python setup.py py2app

      - name: Package app bundle
        run: |
          APP_ZIP="dist/FlexSpotBridge-macOS-${RELEASE_TAG}.zip"
          APP_EXE="dist/FlexSpotBridge-macOS-${RELEASE_TAG}-executable"

          ditto -c -k --sequesterRsrc --keepParent dist/FlexSpotBridge.app "$APP_ZIP"
          shasum -a 256 "$APP_ZIP" > "$APP_ZIP.sha256"

          cp dist/FlexSpotBridge.app/Contents/MacOS/FlexSpotBridge "$APP_EXE"
          chmod +x "$APP_EXE"
          shasum -a 256 "$APP_EXE" > "$APP_EXE.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: FlexSpotBridge ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            dist/FlexSpotBridge-macOS-${{ env.RELEASE_TAG }}.zip
            dist/FlexSpotBridge-macOS-${{ env.RELEASE_TAG }}.zip.sha256
            dist/FlexSpotBridge-macOS-${{ env.RELEASE_TAG }}-executable
            dist/FlexSpotBridge-macOS-${{ env.RELEASE_TAG }}-executable.sha256
