name: Release macOS app

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install py2app

      - name: Build py2app bundle
        run: python setup.py py2app

      - name: Package app bundle
        run: |
          APP_ZIP="dist/FlexSpotBridge-macOS-${GITHUB_REF_NAME}.zip"
          ditto -c -k --sequesterRsrc --keepParent dist/FlexSpotBridge.app "$APP_ZIP"
          shasum -a 256 "$APP_ZIP" > "$APP_ZIP.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/FlexSpotBridge-macOS-${{ github.ref_name }}.zip
            dist/FlexSpotBridge-macOS-${{ github.ref_name }}.zip.sha256
